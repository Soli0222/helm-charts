{{- $createSpotifySecret := not .Values.config.existingSecret }}
{{- $createPostgresSecret := and .Values.postgres.enabled (not .Values.postgres.auth.existingSecret) }}
{{- if or $createSpotifySecret $createPostgresSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "spotify-reblend.fullname" . }}
  labels:
    {{- include "spotify-reblend.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $createSpotifySecret }}
  SPOTIFY_CLIENT_ID: {{ required "config.spotifyClientId is required" .Values.config.spotifyClientId | b64enc | quote }}
  SPOTIFY_CLIENT_SECRET: {{ required "config.spotifyClientSecret is required" .Values.config.spotifyClientSecret | b64enc | quote }}
  AUTH_SECRET: {{ required "config.authSecret is required" .Values.config.authSecret | b64enc | quote }}
  TOKEN_ENCRYPTION_KEY: {{ required "config.tokenEncryptionKey is required" .Values.config.tokenEncryptionKey | b64enc | quote }}
  {{- end }}
  {{- if $createPostgresSecret }}
  {{ include "spotify-reblend.postgres.secretKey" . }}: {{ .Values.postgres.auth.password | default "reblend_password" | b64enc | quote }}
  {{- end }}
{{- end }}
