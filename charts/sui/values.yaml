nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/soli0222/sui
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

replicaCount: 1

containerPort: 3000

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: example.tld
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

config:
  timeZone: Asia/Tokyo
  staticDir: /app/frontend-dist

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "18.3-bookworm"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  persistence:
    enabled: true
    existingClaim: ""
    storageClass: ""
    size: 1Gi
    accessModes:
      - ReadWriteOnce
  auth:
    database: sui
    user: sui
    existingSecret: ""
    existingSecretKey: POSTGRES_PASSWORD
  resources: {}

externalPostgres:
  host: ""
  port: 5432
  database: ""
  user: ""
  existingSecret: ""
  existingSecretKey: password

extraEnv: []
