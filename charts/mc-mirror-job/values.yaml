image:
  repository: minio/mc
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "RELEASE.2025-07-21T05-28-08Z"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

externalSecret:
  # Existing Secret name. This chart does not create the Secret.
  # When empty, defaults to <release fullname>-secret.
  name: ""
  keys:
    sourceUrl: "source_url"
    sourceAccessKey: "source_accesskey"
    sourceSecretKey: "source_secretkey"
    sourcePath: "source_path"
    destinationUrl: "destination_url"
    destinationAccessKey: "destination_accesskey"
    destinationSecretKey: "destination_secretkey"
    destinationPath: "destination_path"

cronjob:
  schedule: "0 * * * *" # Default: every hour at minute 0
  restartPolicy: OnFailure
  aliases:
    source: "source"
    destination: "destination"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
